<!doctype html>
<html>
  <body>
    <h1>Electron 연습</h1>

    <input
      id="showName"
      placeholder="하고 싶은 방탈출 이름( 띄워쓰기까지 정확하게)"
    /><br />
    <input
      id="targetDate"
      placeholder="원하는 날짜 입력( 13일이면 그냥 숫자만쓰기 EX) 13"
    /><br />
    <input
      id="targetTime"
      placeholder="원하는 시간대 입력. 3시면 '오후 3:00'"
    /><br />
    <input id="startTime" placeholder="매크로 시작 시간 입력" /><br />
    <button id="btn">확인</button>
    <p id="result"></p>

    <script src="./renderer.js"></script>
  </body>
</html>
